<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Lokalevents GPT</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html,
    body{
      margin:0;
      padding:0;
      height:100%;
      font-family:Arial, sans-serif;
      background:#111;
      color:#fff;
    }

    #map{
      height:55vh;
      width:100%;
    }

    .top{
      padding:16px;
      background:#111;
    }

    h1{
      margin:0 0 8px 0;
      font-size:32px;
    }

    .hint{
      opacity:0.75;
      margin-bottom:14px;
    }

    input[type="file"]{
      width:100%;
      box-sizing:border-box;
      padding:14px;
      border-radius:12px;
      border:1px solid #444;
      background:#1e1e1e;
      color:#fff;
      font-size:16px;
    }

    #events{
      padding:16px;
      display:grid;
      gap:14px;
    }

    .event-card{
      background:#1e1e1e;
      border:1px solid #333;
      border-radius:16px;
      padding:16px;
    }

    .event-card h3{
      margin:0 0 8px 0;
      font-size:22px;
    }

    .meta{
      opacity:0.75;
      margin-bottom:8px;
    }

    .distance{
      font-weight:bold;
      margin-bottom:8px;
    }

    .event-card p{
      margin:8px 0;
      line-height:1.4;
    }

    .event-card a{
      display:inline-block;
      margin-top:10px;
      color:#fff;
      background:#007aff;
      padding:10px 14px;
      border-radius:10px;
      text-decoration:none;
    }
  </style>
</head>

<body>

  <div class="top">
    <h1>Lokalevents GPT</h1>

    <div class="hint">
      Lade hier die von ChatGPT erzeugte events.json hoch.
    </div>

    <input
      id="jsonFile"
      type="file"
      accept=".json,application/json"
    />
  </div>

  <div id="map"></div>

  <div id="events">
    <div class="event-card">
      <h3>Noch keine GPT-Events geladen</h3>
      <p>
        Wähle oben deine events.json aus.
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js?v=1"></script>

</body>
</html>
