<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <title>KI Eventfinder</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      padding:0;
      width:100%;
      max-width:100%;
      min-height:100%;
      overflow-x:hidden;
      background:#111;
      color:#fff;
      font-family:Arial,sans-serif;
    }

    .top{
      width:100%;
      padding:8px 12px 6px;
      background:#111;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:8px;
    }

    h1{
      margin:0;
      font-size:20px;
      line-height:1.1;
    }

    .status-line{
      grid-column:1 / 2;
      opacity:0.65;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    details{
      grid-column:2 / 3;
      grid-row:1 / 3;
      position:relative;
    }

    summary{
      width:36px;
      height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:#1e1e1e;
      border:1px solid #333;
      cursor:pointer;
      list-style:none;
      font-size:18px;
      user-select:none;
    }

    summary::-webkit-details-marker{
      display:none;
    }

    .admin-panel{
      position:absolute;
      right:0;
      top:44px;
      width:min(340px, calc(100vw - 24px));
      z-index:1000;
      background:#181818;
      border:1px solid #333;
      border-radius:14px;
      padding:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.55);
      display:grid;
      gap:8px;
    }

    button,
    input[type="file"]{
      width:100%;
      max-width:100%;
      display:block;
      padding:12px;
      border-radius:12px;
      border:1px solid #444;
      background:#1e1e1e;
      color:#fff;
      font-size:15px;
    }

    button{
      border:none;
      background:#007aff;
      font-weight:bold;
    }

    textarea{
      display:none;
    }

    .status{
      padding:10px;
      border-radius:10px;
      background:#222;
      color:#ddd;
      font-size:13px;
      line-height:1.35;
      overflow-wrap:break-word;
    }

    .status.ok{
      background:#133d1e;
      color:#7dff9a;
    }

    .status.error{
      background:#471717;
      color:#ff9a9a;
    }

    #map{
      width:100%;
      height:55vh;
      background:#ddd;
      border-top:1px solid #222;
      border-bottom:1px solid #222;
    }

    #events{
      width:100%;
      padding:12px;
      display:grid;
      gap:12px;
      background:#111;
    }

    .event-card{
      width:100%;
      background:#1e1e1e;
      border:1px solid #333;
      border-radius:16px;
      padding:15px;
      overflow:hidden;
    }

    .event-card.active{
      border-color:#ff3b30;
      box-shadow:0 0 0 1px #ff3b30 inset;
    }

    .event-card h3{
      margin:0 0 8px 0;
      font-size:20px;
      line-height:1.25;
      overflow-wrap:break-word;
    }

    .meta{
      opacity:0.72;
      margin-bottom:8px;
      font-size:14px;
      line-height:1.3;
    }

    .distance{
      font-weight:bold;
      margin-bottom:8px;
      font-size:14px;
    }

    .event-card p{
      margin:8px 0;
      line-height:1.35;
      font-size:14px;
      overflow-wrap:break-word;
    }

    .event-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }

    .event-card a{
      display:inline-block;
      color:#fff;
      background:#007aff;
      padding:9px 12px;
      border-radius:10px;
      text-decoration:none;
      font-size:14px;
    }

    .event-card a.source-link{
      background:#333;
    }
  </style>
</head>

<body>

  <div class="top">
    <h1>KI Eventfinder</h1>

    <div class="status-line" id="dataStatus">
      Lade gespeicherte Events…
    </div>

    <details>
      <summary title="Einstellungen">⚙️</summary>

      <div class="admin-panel">
        <input
          id="jsonFile"
          type="file"
          accept=".json,application/json"
        />

        <button id="saveEventsBtn" type="button">
          Events aktualisieren
        </button>

        <button id="sharePromptBtn" type="button">
          🤖 GPT öffnen
        </button>

        <button id="updatePromptBtn" type="button">
          💾 Neue Suche speichern
        </button>

        <textarea id="promptText"></textarea>

        <div id="adminStatus" class="status">
          Noch keine neue Datei ausgewählt.
        </div>

        <div id="promptStatus" class="status">
          Suchtext wird geladen…
        </div>
      </div>
    </details>
  </div>

  <div id="map"></div>

  <div id="events">
    <div class="event-card">
      <h3>Events werden geladen…</h3>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js?v=11"></script>

</body>
</html>
