<p class="admin-title">
  Daten
</p>

<label
  class="file-button"
  for="eventsFileInput"
>
  Events importieren
</label>

<input
  id="eventsFileInput"
  type="file"
  accept=".json,application/json"
/>

<p class="admin-title">
  Suchtext
</p>

<label
  class="file-button"
  for="promptFileInput"
>
  Suchtext importieren
</label>

<input
  id="promptFileInput"
  type="file"
  accept=".txt,text/plain"
/>

<button
  id="exportPromptBtn"
  class="secondary-button"
  type="button"
>
  Suchtext exportieren
</button>
