<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>KI Eventfinder</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial, sans-serif;
      background:#111;
      color:#fff;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .top{
      flex:0 0 auto;
      padding:8px 12px 5px;
      background:#111;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:start;
      gap:8px;
      z-index:1000;
    }

    h1{
      margin:0 0 3px 0;
      font-size:21px;
      font-weight:700;
    }

    .hint{
      opacity:.65;
      font-size:12px;
    }

    details{ position:relative; }

    summary{
      width:32px;
      height:32px;
      border-radius:50%;
      background:#1e1e1e;
      border:1px solid #333;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      list-style:none;
      font-size:17px;
    }

    summary::-webkit-details-marker{
      display:none;
    }

    .admin-panel{
      position:absolute;
      right:0;
      top:40px;
      width:min(340px, calc(100vw - 24px));
      z-index:2000;
      background:#181818;
      border:1px solid #333;
      border-radius:14px;
      padding:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.55);
      display:grid;
      gap:10px;
    }

    button,
    .file-button{
      width:100%;
      padding:13px 12px;
      border-radius:12px;
      border:none;
      background:#007aff;
      color:#fff;
      font-size:15px;
      font-weight:700;
      text-align:center;
      cursor:pointer;
      display:block;
    }

    input[type="file"],
    textarea{
      display:none;
    }

    #map{
      flex:0 0 55vh;
      width:100%;
      min-height:0;
    }

    #events{
      flex:1 1 auto;
      min-height:0;
      padding:0 12px 14px;
      overflow-y:auto;
      overflow-x:hidden;
      scroll-snap-type:y mandatory;
      -webkit-overflow-scrolling:touch;
      background:#111;
      border-top:1px solid #222;
    }

    .event-card{
      width:100%;
      min-height:100%;
      margin:0 0 12px;
      scroll-snap-align:start;
      background:#1e1e1e;
      border:1px solid #333;
      border-radius:14px;
      padding:12px;
      overflow:hidden;
    }

    .event-card h3{
      margin:0 0 10px 0;
      min-height:44px;

      font-size:17px;
      line-height:22px;
      font-weight:700;

      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .meta{
      display:none;
    }

    .distance{
      display:inline-block;
      margin:0;

      font-size:15px;
      font-weight:700;
      line-height:22px;
    }

    .event-card p{
      margin:0;
      overflow:hidden;
    }

    .event-card p:nth-of-type(1){
      display:inline-block;
      margin-left:18px;

      font-size:15px;
      line-height:22px;

      white-space:nowrap;
      text-overflow:ellipsis;
      max-width:70%;
      vertical-align:top;
    }

    .event-card p:nth-of-type(2){
      margin-top:8px;
      min-height:44px;

      font-size:16px;
      line-height:22px;

      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .event-card p:nth-of-type(3){
      display:none;
    }

    .event-card > div[style]{
      margin-top:12px !important;
      display:flex !important;
      gap:10px !important;
    }

    .event-card a{
      flex:1;
      height:48px;

      display:flex;
      align-items:center;
      justify-content:center;

      border-radius:12px;
      background:#007aff;
      color:#fff;

      text-decoration:none;
      font-size:14px;
      font-weight:700;
    }
  </style>
</head>

<body>

<div class="top">
  <div>
    <h1>KI Eventfinder</h1>
    <div class="hint" id="dataStatus">Lade gespeicherte Events.</div>
  </div>

  <details>
    <summary>⚙️</summary>

    <div class="admin-panel">
      <label class="file-button" for="eventsFileInput">Events importieren</label>
      <input id="eventsFileInput" type="file" accept=".json,application/json" />

      <label class="file-button" for="promptFileInput">Suchtext importieren</label>
      <input id="promptFileInput" type="file" accept=".txt,text/plain" />

      <button id="exportPromptBtn" type="button">Suchtext exportieren</button>

      <textarea id="promptText"></textarea>
    </div>
  </details>
</div>

<div id="map"></div>

<div id="events">
  <div class="event-card">
    <h3>Events werden geladen…</h3>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js?v=13"></script>

</body>
</html>
