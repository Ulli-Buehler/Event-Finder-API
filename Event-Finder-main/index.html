<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <title>KI Eventfinder</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      padding:0;
      width:100%;
      max-width:100%;
      height:100%;
      overflow:hidden;
      background:#111;
      color:#fff;
      font-family:Arial,sans-serif;
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .top{
      flex:0 0 auto;
      width:100%;
      padding:7px 10px 5px;
      background:#111;
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:8px;
    }

    h1{
      margin:0;
      font-size:18px;
      font-weight:700;
      line-height:1.1;
    }

    .status-line{
      grid-column:1 / 2;
      opacity:0.62;
      font-size:12px;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    details{
      grid-column:2 / 3;
      grid-row:1 / 3;
      position:relative;
    }

    summary{
      width:34px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      background:#1e1e1e;
      border:1px solid #333;
      cursor:pointer;
      list-style:none;
      font-size:17px;
      user-select:none;
    }

    summary::-webkit-details-marker{
      display:none;
    }

    details[open] summary{
      background:#292929;
    }

    .admin-panel{
      position:absolute;
      right:0;
      top:42px;
      width:min(330px, calc(100vw - 20px));
      z-index:1000;
      background:#181818;
      border:1px solid #333;
      border-radius:14px;
      padding:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
      display:grid;
      gap:7px;
    }

    button,
    input[type="file"]{
      width:100%;
      max-width:100%;
      display:block;
      padding:11px;
      border-radius:11px;
      border:1px solid #444;
      background:#1e1e1e;
      color:#fff;
      font-size:14px;
    }

    button{
      border:none;
      background:#007aff;
      font-weight:600;
    }

    textarea{
      display:none;
    }

    .status{
      width:100%;
      padding:9px;
      border-radius:9px;
      background:#222;
      color:#ddd;
      line-height:1.3;
      font-size:12px;
      overflow-wrap:break-word;
    }

    .status.ok{
      background:#133d1e;
      color:#7dff9a;
    }

    .status.error{
      background:#471717;
      color:#ff9a9a;
    }

    #map{
      flex:1 1 auto;
      width:100%;
      min-height:0;
    }

    #events{
      flex:0 0 28vh;
      width:100%;
      padding:10px;
      display:flex;
      gap:10px;
      overflow-x:auto;
      overflow-y:hidden;
      scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;
      background:#111;
      border-top:1px solid #222;
    }

    .event-card{
      flex:0 0 calc(100vw - 20px);
      max-width:calc(100vw - 20px);
      height:100%;
      overflow-y:auto;
      scroll-snap-align:center;
      background:#1e1e1e;
      border:1px solid #333;
      border-radius:14px;
      padding:13px;
    }

    .event-card.active{
      border-color:#ff3b30;
      box-shadow:0 0 0 1px #ff3b30 inset;
    }

    .event-card h3{
      margin:0 0 6px 0;
      font-size:17px;
      line-height:1.25;
      overflow-wrap:break-word;
    }

    .meta{
      opacity:0.72;
      margin-bottom:6px;
      font-size:13px;
      line-height:1.3;
    }

    .distance{
      font-weight:bold;
      margin-bottom:6px;
      font-size:13px;
    }

    .event-card p{
      margin:6px 0;
      line-height:1.35;
      font-size:14px;
      overflow-wrap:break-word;
    }

    .event-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:8px;
    }

    .event-card a{
      display:inline-block;
      color:#fff;
      background:#007aff;
      padding:8px 11px;
      border-radius:10px;
      text-decoration:none;
      font-size:13px;
      max-width:100%;
    }

    .event-card a.source-link{
      background:#333;
    }
  </style>
</head>

<body>

  <div class="top">

    <h1>KI Eventfinder</h1>

    <div class="status-line" id="dataStatus">
      Lade gespeicherte Events…
    </div>

    <details>

      <summary title="Einstellungen">
        ⚙️
      </summary>

      <div class="admin-panel">

        <input
          id="jsonFile"
          type="file"
          accept=".json,application/json"
        />

        <button id="saveEventsBtn" type="button">
          Events aktualisieren
        </button>

        <button id="sharePromptBtn" type="button">
          🤖 GPT öffnen
        </button>

        <button id="updatePromptBtn" type="button">
          💾 Neue Suche speichern
        </button>

        <textarea id="promptText"></textarea>

        <div id="adminStatus" class="status">
          Noch keine neue Datei ausgewählt.
        </div>

        <div id="promptStatus" class="status">
          Suchtext geladen.
        </div>

      </div>

    </details>

  </div>

  <div id="map"></div>

  <div id="events">
    <div class="event-card">
      <h3>Events werden geladen…</h3>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="app.js?v=9"></script>

</body>
</html>
