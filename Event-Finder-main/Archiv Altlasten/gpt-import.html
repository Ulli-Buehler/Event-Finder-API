<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GPT Event Import</title>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:#fff;
  margin:0;
  padding:20px;
  max-width:1200px;
  margin:auto;
}

h1{
  margin-bottom:20px;
}

textarea{
  width:100%;
  height:320px;
  background:#1e1e1e;
  color:#fff;
  border:1px solid #444;
  border-radius:12px;
  padding:14px;
  font-size:14px;
  line-height:1.5;
  box-sizing:border-box;
}

button{
  margin-top:14px;
  margin-right:10px;
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:#007aff;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

pre{
  margin-top:20px;
  background:#1e1e1e;
  padding:14px;
  border-radius:12px;
  overflow:auto;
  white-space:pre-wrap;
}

.success{
  margin-top:16px;
  padding:12px;
  border-radius:12px;
  background:#133d1e;
  color:#7dff9a;
}

.error{
  margin-top:16px;
  padding:12px;
  border-radius:12px;
  background:#471717;
  color:#ff9a9a;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:24px;
}

th,td{
  border:1px solid #333;
  padding:10px;
  vertical-align:top;
}

th{
  background:#222;
}

a{
  color:#4ea1ff;
}

.small{
  opacity:0.7;
  font-size:13px;
}
</style>
</head>

<body>

<h1>GPT Event Import</h1>

<div class="small">
GPT-Tabelle oder events.json hier einfügen
</div>

<textarea id="input"></textarea>

<div>
  <button onclick="convert()">Importieren</button>
  <button onclick="downloadJson()">JSON herunterladen</button>
</div>

<div id="status"></div>

<pre id="output"></pre>

<div id="preview"></div>

<script>
let parsedEvents = [];

function clean(value){
  return String(value ?? "")
    .replace(/\*\*/g, "")
    .replace(/`/g, "")
    .trim();
}

function normalizeDistance(value){
  if(typeof value === "number") return value;

  const normalized = clean(value)
    .replace(",", ".")
    .replace(/[^0-9.]/g, "");

  const number = Number(normalized);

  return Number.isFinite(number)
    ? number
    : null;
}

function normalizeEvent(raw){
  return {
    distance_km: normalizeDistance(
      raw.distance_km ??
      raw["Entfernung km"] ??
      raw.entfernung ??
      ""
    ),

    title: clean(
      raw.title ??
      raw.Veranstaltung ??
      raw.name ??
      ""
    ),

    date: clean(
      raw.date ??
      raw.Datum ??
      ""
    ),

    time: clean(
      raw.time ??
      raw.Uhrzeit ??
      "nicht angegeben"
    ) || "nicht angegeben",

    location: clean(
      raw.location ??
      raw.Ort ??
      raw.city ??
      ""
    ),

    description: clean(
      raw.description ??
      raw.Kurzbeschreibung ??
      raw.summary ??
      ""
    ),

    address: clean(
      raw.address ??
      raw["Adresse / Koordinaten"] ??
      raw.adresse ??
      ""
    ),

    maps: clean(
      raw.maps ??
      raw.Kartenlink ??
      raw.map ??
      ""
    ),

    source: clean(
      raw.source ??
      raw.Quelle ??
      ""
    )
  };
}

function extractJsonText(text){

  const trimmed = text.trim();

  const firstArray = trimmed.indexOf("[");
  const lastArray = trimmed.lastIndexOf("]");

  if(
    firstArray !== -1 &&
    lastArray !== -1 &&
    lastArray > firstArray
  ){
    return trimmed.slice(
      firstArray,
      lastArray + 1
    );
  }

  const firstObject = trimmed.indexOf("{");
  const lastObject = trimmed.lastIndexOf("}");

  if(
    firstObject !== -1 &&
    lastObject !== -1 &&
    lastObject > firstObject
  ){
    return "[" +
      trimmed.slice(
        firstObject,
        lastObject + 1
      ) +
    "]";
  }

  return "";
}

function parseJsonInput(text){

  const jsonText = extractJsonText(text);

  if(!jsonText){
    return [];
  }

  const data = JSON.parse(jsonText);

  const list = Array.isArray(data)
    ? data
    : [data];

  return list
    .map(normalizeEvent)
    .filter(event =>
      event.title ||
      event.location ||
      event.source
    );
}

function parseTableInput(text){

  const rows = text
    .split("\n")
    .filter(line => line.includes("|"));

  const events = [];

  for(const row of rows){

    const cols = row
      .split("|")
      .map(v => clean(v))
      .filter(Boolean);

    if(cols.length < 8) continue;

    if(
      cols[0]
      .toLowerCase()
      .includes("entfernung")
    ){
      continue;
    }

    if(cols[0].includes("---")){
      continue;
    }

    events.push(
      normalizeEvent({
        distance_km: cols[0],
        title: cols[1],
        date: cols[2],
        time: cols[3],
        location: cols[4],
        description: cols[5],
        address: cols[6],
        maps: cols[7],
        source: cols[8] || ""
      })
    );
  }

  return events;
}

function convert(){

  const text =
    document.getElementById("input").value;

  parsedEvents = [];

  try{
    parsedEvents = parseJsonInput(text);
  }
  catch(error){
    console.warn(
      "JSON konnte nicht gelesen werden:",
      error
    );
  }

  if(parsedEvents.length === 0){
    parsedEvents = parseTableInput(text);
  }

  renderResult();
}

function renderResult(){

  const status =
    document.getElementById("status");

  const output =
    document.getElementById("output");

  const preview =
    document.getElementById("preview");

  if(parsedEvents.length === 0){

    status.innerHTML = `
      <div class="error">
        Keine gültigen Events erkannt
      </div>
    `;

    output.textContent = "";
    preview.innerHTML = "";

    return;
  }

  status.innerHTML = `
    <div class="success">
      ${parsedEvents.length} Events erkannt
    </div>
  `;

  output.textContent =
    JSON.stringify(parsedEvents, null, 2);

  let html = `
    <table>
      <tr>
        <th>km</th>
        <th>Event</th>
        <th>Ort</th>
        <th>Karte</th>
      </tr>
  `;

  for(const event of parsedEvents){

    html += `
      <tr>

        <td>
          ${event.distance_km ?? ""}
        </td>

        <td>
          <b>${event.title}</b><br>
          ${event.date}<br>
          ${event.time}
        </td>

        <td>
          ${event.location}<br>

          <span class="small">
            ${event.address}
          </span>
        </td>

        <td>
          ${
            event.maps
            ? `<a href="${event.maps}" target="_blank">Karte</a>`
            : ""
          }
        </td>

      </tr>
    `;
  }

  html += "</table>";

  preview.innerHTML = html;
}

function downloadJson(){

  if(parsedEvents.length === 0){

    alert("Keine Daten vorhanden");

    return;
  }

  const blob = new Blob(
    [
      JSON.stringify(
        parsedEvents,
        null,
        2
      )
    ],
    {
      type:"application/json"
    }
  );

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;
  a.download = "events.json";

  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
