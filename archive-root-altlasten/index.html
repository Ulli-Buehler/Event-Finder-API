<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <title>Lokalevents GPT</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      padding:0;
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      background:#111;
      color:#fff;
      font-family:Arial,sans-serif;
    }

    body{
      min-height:100vh;
    }

    #map{
      width:100%;
      height:58vh;
    }

    .top{
      width:100%;
      padding:10px 12px 6px;
      background:#111;
    }

    h1{
      margin:0 0 4px 0;
      font-size:22px;
      font-weight:700;
      letter-spacing:0.2px;
    }

    .hint{
      opacity:0.65;
      margin-bottom:8px;
      line-height:1.3;
      font-size:13px;
    }

    details{
      width:100%;
      margin-top:8px;
      background:#181818;
      border:1px solid #2a2a2a;
      border-radius:12px;
      padding:10px;
      overflow:hidden;
    }

    summary{
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      opacity:0.58;
      user-select:none;
      list-style:none;
    }

    summary::-webkit-details-marker{
      display:none;
    }

    button,
    input[type="file"]{
      width:100%;
      max-width:100%;
      display:block;
      padding:12px;
      margin:4px 0;
      border-radius:12px;
      border:1px solid #444;
      background:#1e1e1e;
      color:#fff;
      font-size:15px;
    }

    button{
      border:none;
      background:#007aff;
      font-weight:600;
    }

    textarea{
      display:none;
    }

    .status{
      width:100%;
      margin-top:8px;
      padding:10px;
      border-radius:10px;
      background:#222;
      color:#ddd;
      line-height:1.35;
      font-size:13px;
      overflow-wrap:break-word;
    }

    .status.ok{
      background:#133d1e;
      color:#7dff9a;
    }

    .status.error{
      background:#471717;
      color:#ff9a9a;
    }

    #events{
      width:100%;
      padding:12px;
      display:grid;
      gap:10px;
    }

    .event-card{
      width:100%;
      background:#1e1e1e;
      border:1px solid #333;
      border-radius:14px;
      padding:14px;
      overflow:hidden;
    }

    .event-card h3{
      margin:0 0 6px 0;
      font-size:18px;
      line-height:1.25;
      overflow-wrap:break-word;
    }

    .meta{
      opacity:0.72;
      margin-bottom:6px;
      font-size:14px;
    }

    .distance{
      font-weight:bold;
      margin-bottom:6px;
      font-size:14px;
    }

    .event-card p{
      margin:6px 0;
      line-height:1.35;
      font-size:14px;
      overflow-wrap:break-word;
    }

    .event-card a{
      display:inline-block;
      margin-top:8px;
      color:#fff;
      background:#007aff;
      padding:9px 12px;
      border-radius:10px;
      text-decoration:none;
      font-size:14px;
      max-width:100%;
    }

  </style>
</head>

<body>

  <div class="top">

    <h1>Lokalevents GPT</h1>

    <div class="hint" id="dataStatus">
      Lade gespeicherte Events…
    </div>

    <details>

      <summary>
        ⚙️ Admin
      </summary>

      <div
        style="
          margin-top:10px;
          display:grid;
          gap:6px;
          width:100%;
        "
      >

        <input
          id="jsonFile"
          type="file"
          accept=".json,application/json"
        />

        <button id="saveEventsBtn" type="button">
          Events aktualisieren
        </button>

        <button id="sharePromptBtn" type="button">
          🤖 GPT öffnen
        </button>

        <button id="updatePromptBtn" type="button">
          💾 Neue Suche speichern
        </button>

        <textarea id="promptText"></textarea>

        <div id="adminStatus" class="status">
          Noch keine neue Datei ausgewählt.
        </div>

        <div id="promptStatus" class="status">
          Suchtext geladen.
        </div>

      </div>

    </details>

  </div>

  <div id="map"></div>

  <div id="events">
    <div class="event-card">
      <h3>Events werden geladen…</h3>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="app.js?v=7"></script>

</body>
</html>
