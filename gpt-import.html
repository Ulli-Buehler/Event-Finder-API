<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPT Event Import</title>

  <style>
    body{
      font-family:sans-serif;
      background:#111;
      color:#fff;
      padding:20px;
      max-width:900px;
      margin:auto;
    }

    textarea{
      width:100%;
      height:320px;
      background:#1e1e1e;
      color:#fff;
      border:1px solid #444;
      border-radius:12px;
      padding:12px;
      font-size:14px;
    }

    button{
      margin-top:12px;
      padding:12px 18px;
      border:none;
      border-radius:12px;
      background:#007aff;
      color:white;
      font-size:16px;
    }

    pre{
      margin-top:20px;
      background:#1e1e1e;
      padding:12px;
      border-radius:12px;
      overflow:auto;
      white-space:pre-wrap;
    }
  </style>
</head>

<body>

<h1>GPT Event Import</h1>

<textarea id="input"></textarea>

<button onclick="convert()">
GPT Tabelle umwandeln
</button>

<pre id="output"></pre>

<script>

function convert(){

  const text =
    document.getElementById("input").value;

  const lines =
    text.split("\n")
      .filter(l => l.includes("|"));

  const events = [];

  for(const line of lines){

    const cols =
      line.split("|")
        .map(v => v.trim())
        .filter(Boolean);

    if(cols.length < 8) continue;

    if(cols[0].includes("Entfernung")) continue;

    events.push({

      title: cols[1] || "",
      startDate: cols[2] || "",
      time: cols[3] || "",
      city: cols[4] || "",
      description: cols[5] || "",
      address: cols[6] || "",
      detailUrl: cols[7] || "",

      category: "Event",

      lat: null,
      lng: null
    });
  }

  document.getElementById("output")
    .innerText =
      JSON.stringify(events,null,2);
}

</script>

</body>
</html>
